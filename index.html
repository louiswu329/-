<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>大璽工作台</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Noto Sans TC', sans-serif;
    background: #F5F4F0;
    color: #1a1a1a;
    min-height: 100vh;
    padding-bottom: 80px;
  }
  .header {
    background: #1a1a1a;
    padding: 52px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .brand { font-size: 17px; font-weight: 600; color: #fff; letter-spacing: .02em; }
  .brand-sub { font-size: 12px; color: #888; margin-top: 3px; }
  .date-chip { font-size: 11px; color: #888; }
  .stats { display: flex; gap: 6px; }
  .stat-btn {
    flex: 1;
    background: #2a2a2a;
    border: 1.5px solid transparent;
    border-radius: 10px;
    padding: 10px 0;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .stat-btn.active { border-color: #555; }
  .stat-num { font-size: 20px; font-weight: 700; color: #fff; line-height: 1; }
  .stat-num.green { color: #A8E6C3; }
  .stat-label { font-size: 9px; color: #888; margin-top: 3px; }
  .progress-wrap { background: #1a1a1a; padding: 0 20px 14px; }
  .progress-bar { height: 3px; background: #333; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #A8E6C3; border-radius: 2px; transition: width .4s ease; }
  .content { padding: 8px 20px 0; }
  .task-card {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid #e8e6e2;
    cursor: pointer;
    transition: opacity .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .task-card.done { opacity: .45; }
  .task-card.done .task-title { text-decoration: line-through; }
  .check-btn {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1.5px solid #ccc;
    background: transparent;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .check-btn.checked { background: #A8E6C3; border-color: #A8E6C3; }
  .check-btn.checked::after { content: '✓'; font-size: 12px; color: #1a6640; font-weight: 700; }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 14px; line-height: 1.45; color: #1a1a1a; margin-bottom: 3px; }
  .task-note { font-size: 11px; color: #aaa; }
  .task-expire { font-size: 10px; color: #CC7700; margin-top: 4px; }
  .empty {
    text-align: center;
    padding: 50px 20px;
    color: #bbb;
    font-size: 14px;
  }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }
  .add-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid #eee;
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    display: flex;
    gap: 8px;
    align-items: center;
    z-index: 20;
  }
  .add-input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 22px;
    border: 1.5px solid #e0e0e0;
    font-size: 14px;
    font-family: inherit;
    background: #F5F4F0;
    color: #1a1a1a;
    outline: none;
  }
  .add-input:focus { border-color: #1a1a1a; }
  .add-input::placeholder { color: #bbb; }
  .add-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #1a1a1a;
    border: none;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    line-height: 1;
  }
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    color: #fff;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 12px;
    z-index: 100;
    opacity: 0;
    transition: opacity .2s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="brand">大璽工作台</div>
      <div class="brand-sub">代辦事項</div>
    </div>
    <div class="date-chip" id="today-date"></div>
  </div>
  <div class="stats">
    <button class="stat-btn active" id="btn-all" onclick="setView('all')">
      <div class="stat-num" id="s-total">0</div>
      <div class="stat-label">全部任務</div>
    </button>
    <button class="stat-btn" id="btn-done" onclick="setView('done')">
      <div class="stat-num green" id="s-done">0</div>
      <div class="stat-label">已完成</div>
    </button>
    <button class="stat-btn" id="btn-todo" onclick="setView('todo')">
      <div class="stat-num" id="s-left">0</div>
      <div class="stat-label">待處理</div>
    </button>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
</div>

<div class="content" id="task-list"></div>

<div class="add-bar">
  <input class="add-input" id="new-task" type="text" placeholder="新增任務…" />
  <button class="add-btn" onclick="addTask()">+</button>
</div>

<div class="toast" id="toast"></div>

<script>
var DAY_MS = 86400000;
var STORAGE_KEY = 'dashi_v3';

var defaultTasks = [
  {id:1, title:'7天 Threads 文章', done:false, doneAt:null, note:'每天一篇，保持更新頻率'},
  {id:2, title:'3支短影音逐字稿', done:false, doneAt:null, note:'老屋翻新主題為主'},
  {id:3, title:'Messenger 初次回覆模板', done:false, doneAt:null, note:'一問一答流程，四輪導引'},
  {id:4, title:'Meta 廣告數據表格建立', done:false, doneAt:null, note:'需準備廣告數據'},
  {id:5, title:'SOP 正式建立', done:false, doneAt:null, note:'六階段流程整理'},
];

var tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || defaultTasks;
var currentView = 'all';
var nextId = Math.max.apply(null, tasks.map(function(t){return t.id})) + 1;

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }

function setView(v) {
  currentView = v;
  document.getElementById('btn-all').className = 'stat-btn' + (v==='all'?' active':'');
  document.getElementById('btn-done').className = 'stat-btn' + (v==='done'?' active':'');
  document.getElementById('btn-todo').className = 'stat-btn' + (v==='todo'?' active':'');
  render();
}

function toggle(id) {
  var t = tasks.find(function(x){return x.id===id});
  if (!t) return;
  t.done = !t.done;
  t.doneAt = t.done ? Date.now() : null;
  save();
  showToast(t.done ? '完成 ✓' : '已取消完成');
  render();
}

function addTask() {
  var inp = document.getElementById('new-task');
  var title = inp.value.trim();
  if (!title) return;
  tasks.push({id: nextId++, title: title, done: false, doneAt: null, note: ''});
  inp.value = '';
  save();
  showToast('任務已新增');
  render();
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 1600);
}

function daysLeft(doneAt) {
  if (!doneAt) return 10;
  var elapsed = Math.floor((Date.now() - doneAt) / DAY_MS);
  return Math.max(0, 10 - elapsed);
}

function cleanExpired() {
  tasks = tasks.filter(function(t) {
    return !t.done || daysLeft(t.doneAt) > 0;
  });
  save();
}

function render() {
  cleanExpired();

  var total = tasks.length;
  var done = tasks.filter(function(t){return t.done}).length;
  var left = total - done;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-left').textContent = left;
  document.getElementById('progress').style.width = total ? Math.round(done/total*100)+'%' : '0%';

  var list;
  if (currentView === 'done') list = tasks.filter(function(t){return t.done});
  else if (currentView === 'todo') list = tasks.filter(function(t){return !t.done});
  else list = tasks.slice();

  var el = document.getElementById('task-list');

  if (!list.length) {
    var msg = currentView==='done' ? '還沒有完成的任務' : currentView==='todo' ? '太棒了，全部完成！' : '還沒有任務';
    el.innerHTML = '<div class="empty"><div class="empty-icon">' + (currentView==='todo'?'🎉':'📋') + '</div>' + msg + '</div>';
    return;
  }

  el.innerHTML = list.map(function(t) {
    var remain = t.done ? daysLeft(t.doneAt) : null;
    return '<div class="task-card' + (t.done?' done':'') + '" onclick="toggle(' + t.id + ')">'
      + '<div class="check-btn' + (t.done?' checked':'') + '"></div>'
      + '<div class="task-body">'
      + '<div class="task-title">' + t.title + '</div>'
      + (t.note ? '<div class="task-note">' + t.note + '</div>' : '')
      + (t.done && remain !== null ? '<div class="task-expire">' + remain + ' 天後自動清除</div>' : '')
      + '</div></div>';
  }).join('');
}

document.getElementById('new-task').addEventListener('keydown', function(e){if(e.key==='Enter')addTask()});

var now = new Date();
var days = ['日','一','二','三','四','五','六'];
document.getElementById('today-date').textContent = (now.getMonth()+1) + '/' + now.getDate() + ' 週' + days[now.getDay()];

render();
</script>
</body>
</html>
